name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: ['main']
  merge_group:
  push:
    branches: ['main']

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit -- --runInBand

      - name: Integration tests
        run: npm run test:integration -- --runInBand

      - name: E2E tests
        run: npm run test:e2e -- --runInBand
